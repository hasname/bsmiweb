---
- hosts: web
  vars:
    home_dir: "{{ ansible_facts['user_dir'] }}"
    deploy_path: "{{ home_dir }}/bsmiweb"
    mise_node_bin: "{{ home_dir }}/.local/share/mise/shims"
    systemd_user_dir: "{{ home_dir }}/.config/systemd/user"
  tasks:
    - name: Sync project files
      ansible.posix.synchronize:
        src: "{{ playbook_dir }}/../"
        dest: "{{ deploy_path }}/"
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=node_modules"
          - "--exclude=prisma/dev.db"
          - "--exclude=src/generated"
          - "--exclude=.env"
          - "--exclude=ansible/lib"

    - name: Copy .env file
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../{{ dotenv_file }}"
        dest: "{{ deploy_path }}/.env"
        mode: "0600"

    - name: Install npm dependencies
      ansible.builtin.command:
        cmd: npm install --omit=dev
        chdir: "{{ deploy_path }}"
      environment:
        PATH: "{{ mise_node_bin }}:{{ ansible_facts['env']['PATH'] }}"

    - name: Mark existing migrations as applied
      ansible.builtin.command:
        cmd: "npx prisma migrate resolve --applied {{ item }}"
        chdir: "{{ deploy_path }}"
      environment:
        NODE_ENV: production
        PATH: "{{ mise_node_bin }}:{{ ansible_facts['env']['PATH'] }}"
      loop:
        - 0001_baseline
        - 0002_rename_to_snake_case
      register: resolve_result
      failed_when: false
      changed_when: resolve_result.rc == 0

    - name: Run database migrations
      ansible.builtin.command:
        cmd: npx prisma migrate deploy
        chdir: "{{ deploy_path }}"
      environment:
        NODE_ENV: production
        PATH: "{{ mise_node_bin }}:{{ ansible_facts['env']['PATH'] }}"

    - name: Generate Prisma client
      ansible.builtin.command:
        cmd: npx prisma generate
        chdir: "{{ deploy_path }}"
      environment:
        NODE_ENV: production
        PATH: "{{ mise_node_bin }}:{{ ansible_facts['env']['PATH'] }}"

    - name: Create systemd user directory
      ansible.builtin.file:
        path: "{{ systemd_user_dir }}"
        state: directory
        mode: "0755"

    - name: Install systemd user service files
      ansible.builtin.template:
        src: "{{ item.src }}"
        dest: "{{ systemd_user_dir }}/{{ item.dest }}"
        mode: "0644"
      loop:
        - { src: "{{ playbook_dir }}/bsmiweb.service.j2", dest: "bsmiweb.service" }
        - { src: "{{ playbook_dir }}/bsmiweb-cron.service.j2", dest: "bsmiweb-cron.service" }

    - name: Reload systemd user daemon
      ansible.builtin.systemd:
        daemon_reload: true
        scope: user

    - name: Enable and restart bsmiweb services
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: restarted
        enabled: true
        scope: user
      loop:
        - bsmiweb.service
        - bsmiweb-cron.service
