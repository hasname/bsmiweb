---
- hosts: web
  vars:
    deploy_path: /home/service/bsmiweb
    systemd_user_dir: /home/service/.config/systemd/user
  tasks:
    - name: Sync project files
      ansible.posix.synchronize:
        src: "{{ playbook_dir }}/../"
        dest: "{{ deploy_path }}/"
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=node_modules"
          - "--exclude=prisma/dev.db"
          - "--exclude=src/generated"
          - "--exclude=.env"

    - name: Copy .env file
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../{{ dotenv_file }}"
        dest: "{{ deploy_path }}/.env"
        mode: "0600"

    - name: Install npm dependencies
      ansible.builtin.command:
        cmd: npm install --omit=dev
        chdir: "{{ deploy_path }}"

    - name: Run database migration
      ansible.builtin.command:
        cmd: npx prisma migrate deploy
        chdir: "{{ deploy_path }}"
      environment:
        NODE_ENV: production

    - name: Generate Prisma client
      ansible.builtin.command:
        cmd: npx prisma generate
        chdir: "{{ deploy_path }}"

    - name: Create systemd user directory
      ansible.builtin.file:
        path: "{{ systemd_user_dir }}"
        state: directory
        mode: "0755"

    - name: Install systemd user service files
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "{{ systemd_user_dir }}/{{ item | basename }}"
        mode: "0644"
      loop:
        - "{{ playbook_dir }}/bsmiweb.service"
        - "{{ playbook_dir }}/bsmiweb-cron.service"

    - name: Reload systemd user daemon
      ansible.builtin.systemd:
        daemon_reload: true
        scope: user

    - name: Enable and restart bsmiweb services
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: restarted
        enabled: true
        scope: user
      loop:
        - bsmiweb.service
        - bsmiweb-cron.service
